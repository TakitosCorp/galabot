<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Stream Banner</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="w-full h-screen bg-gradient-to-br from-red-600 to-pink-500 relative overflow-hidden"
  >
    <div
      class="absolute top-4 left-4 bg-white/90 backdrop-blur-sm rounded-full px-4 py-2 flex items-center space-x-2 shadow-lg"
    >
      <div class="w-2.5 h-2.5 bg-red-500 rounded-full pulse-dot"></div>
      <span class="text-gray-900 font-semibold text-sm">LIVE</span>
    </div>

    <div class="flex items-center justify-center h-full px-8">
      <div
        class="bg-white/60 backdrop-blur-sm rounded-2xl shadow-2xl p-8 max-w-5xl w-full border border-white/60 hover:bg-white/70 transition-all duration-300"
      >
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8 items-center">
          <div class="lg:col-span-2 flex justify-center">
            <div class="relative group">
              <img
                id="thumbnailImage"
                src="{{THUMBNAIL_URL}}"
                alt="Stream thumbnail"
                class="rounded-xl shadow-2xl w-full max-w-xs h-auto object-cover transition-all duration-300 group-hover:scale-105 group-hover:shadow-red-500/25"
              />
              <div
                class="absolute inset-0 rounded-xl bg-gradient-to-t from-red-900/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"
              ></div>
            </div>
          </div>

          <div class="lg:col-span-3 space-y-6">
            <div class="space-y-3">
              <h1
                id="streamTitle"
                class="text-3xl lg:text-4xl font-bold text-gray-900 leading-tight drop-shadow-sm"
              >
                {{STREAM_TITLE}}
              </h1>
              <div class="flex items-center space-x-2">
                <div class="w-2 h-2 bg-red-500 rounded-full"></div>
                <span class="text-gray-900 text-lg font-normal tracking-wide">
                  YouTube Live
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="absolute bottom-4 right-4">
      <div class="flex items-center text-white text-base">
        <svg
          class="w-5 h-5 mr-2 text-white"
          fill="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"
          />
        </svg>
        <span class="font-mono">youtube.com/@galayaki</span>
      </div>
    </div>
  </body>
</html>
