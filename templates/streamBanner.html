<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stream Banner</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="w-full h-screen {{BG_CLASS}} relative overflow-hidden">
    <div
      class="absolute top-4 left-4 bg-white/90 backdrop-blur-sm rounded-full px-4 py-2 flex items-center space-x-2 shadow-lg"
    >
      <div class="w-2.5 h-2.5 bg-red-500 rounded-full animate-pulse"></div>
      <span class="text-gray-900 font-semibold text-sm">LIVE</span>
    </div>

    <div class="flex items-center justify-center h-full px-8">
      <div
        class="bg-white/60 backdrop-blur-sm rounded-2xl shadow-2xl p-8 max-w-5xl w-full border border-white/60"
      >
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8 items-center">
          <div class="lg:col-span-2 flex justify-center">
            <img
              id="gameImage"
              src="{{GAME_IMAGE_URL}}"
              class="rounded-xl shadow-2xl w-full max-w-xs h-auto object-cover"
            />
          </div>

          <div class="lg:col-span-3 space-y-6">
            <h1
              id="streamTitle"
              class="text-3xl lg:text-4xl font-bold text-gray-900 leading-tight drop-shadow-sm"
            >
              {{STREAM_TITLE}}
            </h1>
            <div class="flex items-center space-x-2">
              <div class="w-2 h-2 bg-gray-900 rounded-full"></div>
              <span
                class="text-gray-900 text-lg font-normal tracking-wide"
                id="streamCategory"
              >
                {{STREAM_CATEGORY}}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="absolute bottom-4 right-4">
      <div class="flex items-center text-white text-base">
        <span class="font-mono">{{LINK_TEXT}}</span>
      </div>
    </div>
  </body>
</html>
